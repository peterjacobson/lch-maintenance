<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Living Compost Hubs — Under maintenance</title>
  <meta name="description" content="Living Compost Hubs is temporarily down for maintenance. In the meantime, please contact hello@kaicycle.org.nz." />
  <meta name="robots" content="noindex" />

  <!-- Open Graph / social -->
  <meta property="og:title" content="Living Compost Hubs — Under maintenance" />
  <meta property="og:description" content="We're temporarily down for maintenance. Please contact hello@kaicycle.org.nz in the meantime." />
  <meta property="og:type" content="website" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>" />

  <style>
    :root {
      --bg: #f4f1e8;
      --card: #ffffff;
      --ink: #2f3b2e;
      --ink-soft: #5b6a55;
      --green: #3f7d4e;
      --green-dark: #2c5d39;
      --accent: #e8efe2;
      --border: #e2ddcd;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 0%, #eef3e6 0%, transparent 45%),
        radial-gradient(circle at 90% 100%, #eaf0e2 0%, transparent 40%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 50px -24px rgba(47, 59, 46, 0.35);
      max-width: 520px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
    }

    .mark {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green-dark);
    }

    .mark svg { width: 34px; height: 34px; }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--green);
      margin: 0 0 12px;
    }

    h1 {
      font-size: 1.7rem;
      margin: 0 0 14px;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    p {
      margin: 0 auto 18px;
      color: var(--ink-soft);
      max-width: 40ch;
    }

    .contact {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .contact-label {
      font-size: 0.8rem;
      color: var(--ink-soft);
      margin-bottom: 12px;
    }

    a.button {
      display: inline-block;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 999px;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    a.button:hover { background: var(--green-dark); transform: translateY(-1px); }
    a.button:focus-visible { outline: 3px solid var(--green-dark); outline-offset: 2px; }

    .brand {
      margin-top: 32px;
      font-size: 0.78rem;
      color: var(--ink-soft);
      opacity: 0.8;
    }

    @media (max-width: 420px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 1.45rem; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">
      <!-- sprout -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22V12" />
        <path d="M12 12C12 8 15 5 20 5c0 4-3 7-8 7Z" />
        <path d="M12 14C12 11 9.5 8.5 5 8.5c0 3.5 2.5 5.5 7 5.5Z" />
      </svg>
    </div>

    <p class="eyebrow">Temporarily offline</p>
    <h1>We're down for maintenance</h1>
    <p>
      Living Compost Hubs is taking a short break while we make some improvements.
      We'll be back online shortly — thanks for your patience.
    </p>

    <div class="contact">
      <p class="contact-label">In the meantime, get in touch:</p>
      <a class="button" href="mailto:hello@kaicycle.org.nz">hello@kaicycle.org.nz</a>
    </div>

    <p class="brand">Living Compost Hubs · Kaicycle</p>
  </main>
</body>
</html>
